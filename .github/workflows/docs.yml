name: Docs

# Build the documentation site (Zensical) plus the playable WebAssembly build
# (Trunk), then publish both to GitHub Pages on every push to the default
# branch. The web build is served under /play so the docs site and the game
# live at the same origin. Also runnable on demand from the Actions tab.
on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - "assets/**"
      - "index.html"
      - "Trunk.toml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS assets)
        uses: actions/checkout@v4
        with:
          # The textures and music are embedded via `include_bytes!`; without
          # the real LFS files the web build would compile pointer files instead.
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Zensical
        run: pip install zensical==0.0.46

      - name: Download self-hosted fonts
        run: python scripts/fetch-fonts.py

      - name: Build docs site
        run: zensical build --strict

      - name: Install Rust toolchain (wasm)
        # Pinned to match rust-toolchain.toml; keeps the wasm link deterministic.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          # Bump this to invalidate stale caches (e.g. after a toolchain change).
          prefix-key: "v2-wasm"

      - name: Build web (wasm)
        # macroquad compiles the `hero` bin to hero.wasm (no wasm-bindgen/Trunk).
        run: cargo build --release --target wasm32-unknown-unknown --bin hero

      - name: Assemble web bundle
        # index.html loads ./hero.wasm and ./mq_js_bundle.js with relative paths,
        # so it works under the /play/ base path with no rewriting.
        run: |
          mkdir -p site/play
          cp index.html site/play/index.html
          cp target/wasm32-unknown-unknown/release/hero.wasm site/play/hero.wasm
          # Save-file JS glue (IndexedDB backend + byte marshalling).
          cp sapp_jsutils.js site/play/sapp_jsutils.js
          cp hoto_storage.js site/play/hoto_storage.js
          # Web gamepad support (browser Gamepad API -> wasm input module).
          cp hoto_gamepads.js site/play/hoto_gamepads.js
          curl -sSfL https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js \
            -o site/play/mq_js_bundle.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
