name: Release

# Build and publish native binaries for Windows, macOS and Linux whenever a
# version tag (e.g. v0.1.0) is pushed. Textures and music are embedded into the
# executable via `include_bytes!`, so each archive is a single self-contained
# binary (named `hero`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout (with LFS assets)
        uses: actions/checkout@v4
        with:
          # The embedded textures and music are stored in Git LFS; without them
          # `include_bytes!` would compile LFS pointer files instead of the
          # real assets.
          lfs: true

      - name: Install Rust toolchain
        # Pinned to match rust-toolchain.toml so native + web builds stay in sync.
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        # macroquad/miniquad links X11 + OpenGL, and its audio backend uses ALSA.
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="hero-of-the-overworld-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" hero
          echo "ASSET=$archive" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "hero-of-the-overworld-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/hero.exe" -DestinationPath $archive
          echo "ASSET=$archive" >> $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
