site_name: Hero of the Overworld
site_description: A small, extensible turn-based JRPG written in Rust, rendered with wgpu.
site_url: https://playforge-coding.github.io/hero-of-the-overworld/
repo_url: https://github.com/playforge-coding/hero-of-the-overworld
repo_name: playforge-coding/hero-of-the-overworld
copyright: Documentation licensed CC BY-NC-SA 4.0 · Game code licensed AGPL-3.0-only

theme:
  name: material
  # Disable Zensical's Google Fonts CDN loading; we self-host instead. The
  # webfonts and stylesheets/fonts.css are generated by scripts/fetch-fonts.py.
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  custom_dir: docs/overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/fonts.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Controls: controls.md
  - Gameplay: gameplay.md
  - The Overworld: world.md
  - Battles: battles.md
  - Weapons & Armor: equipment.md
  - Items: items.md
  - Shops: shops.md
  - The Story: story.md
  - Bestiary:
      - Overview: entities/index.md
      - Roland: entities/roland.md
      - Elara: entities/elara.md
      - Gareth: entities/gareth.md
      - Slime: entities/slime.md
      - Mimic: entities/mimic.md
      - Mountain Crab: entities/mountain_crab.md
      - Skeleton: entities/skeleton.md
      - Gargoyle: entities/gargoyle.md
      - Demon: entities/demon.md
      - Dark Knight: entities/dark_knight.md
      - Dragon: entities/dragon.md
      - Club Goblin: entities/club_goblin.md
      - Archer Goblin: entities/archer_goblin.md
      - Orc Brute: entities/orc_brute.md
      - Ballista: entities/ballista.md
      - Demon Elite: entities/demon_elite.md
      - Demon King: entities/demon_king.md
      - Minotaur: entities/minotaur.md
      - The Clones: entities/clones.md
  - Extending the Game: modding.md
  - Credits: credits.md
