<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Lock zoom and honour the notch: the game fills the display and the
         canvas draws under rounded corners / camera cut-outs. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- Standalone, dark UI when added to a phone home screen. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#05060a" />
    <title>Hero of the Overworld</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        /* `dvh` tracks the *visible* viewport, so the canvas doesn't jump when a
           mobile browser's address bar slides away (unlike `vh`). */
        width: 100%;
        height: 100dvh;
        background: #05060a;
        overflow: hidden;
        /* Kill iOS rubber-band scrolling / pull-to-refresh over the game. */
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        /* `fixed` stops the page itself from scrolling on mobile. */
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        /* No blue tap flash or text selection when jabbing the controls. */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        /* The renderer routes touches to the on-screen controls itself, so the
           browser must not treat them as scroll/zoom gestures. */
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <!-- macroquad renders into a canvas with this exact id. -->
    <canvas id="glcanvas" tabindex="1"></canvas>
    <!-- miniquad/macroquad JS glue. Self-hosted next to this page (the docs CI
         downloads it); for local web dev, fetch it once:
           curl -L https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js -o mq_js_bundle.js -->
    <script src="./mq_js_bundle.js"></script>
    <!-- Save-file support: sapp_jsutils marshals byte buffers between wasm and
         JS, and hoto_storage.js persists them to IndexedDB. Both register
         miniquad plugins, so they must load after the bundle and before the
         wasm module is instantiated. -->
    <script src="./sapp_jsutils.js"></script>
    <script src="./hoto_storage.js"></script>
    <!-- Web gamepad support: reads the browser Gamepad API and exposes it to the
         wasm input module. Also a miniquad plugin, so it loads here too. -->
    <script src="./hoto_gamepads.js"></script>
    <script>
      // The bin is named `hero`, so `cargo build --target wasm32-unknown-unknown`
      // produces hero.wasm.
      load("./hero.wasm");
    </script>
    <script>
      // Robust canvas resizing for mobile. miniquad's bundle only re-measures the
      // canvas on `window.onresize`, which on phones is unreliable: rotating the
      // device often fires no `resize`, or fires it before the layout has settled,
      // so the drawing buffer keeps its old (portrait) size. The game then renders
      // letterboxed for the wrong orientation and hit-tests the on-screen touch
      // controls against stale dimensions — so in landscape the canvas looks too
      // narrow and taps don't register.
      //
      // Re-dispatching a `resize` event re-triggers miniquad's own handler, which
      // reads the *current* CSS box (`clientWidth`/`clientHeight`) — so we just
      // need to nudge it whenever the box actually changes.
      (function () {
        const nudge = () => window.dispatchEvent(new Event("resize"));
        // Fire once now, then again after layout settles. Mobile browsers report
        // the pre-rotation size for a beat after `orientationchange`, so a couple
        // of delayed re-dispatches catch the final dimensions.
        const nudgeSettled = () => {
          nudge();
          setTimeout(nudge, 100);
          setTimeout(nudge, 300);
          setTimeout(nudge, 600);
        };
        window.addEventListener("orientationchange", nudgeSettled);
        // A ResizeObserver on the canvas catches every layout-box change — the
        // address bar sliding away, split-screen, foldables — including the ones
        // that never emit a `window` resize. It observes the CSS box, not the
        // drawing buffer miniquad mutates, so this can't loop.
        const canvas = document.querySelector("#glcanvas");
        if (canvas && "ResizeObserver" in window) {
          new ResizeObserver(nudge).observe(canvas);
        }
        // The visual viewport tracks pinch-zoom and the mobile URL bar, neither of
        // which fire a normal `resize`.
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", nudge);
        }
      })();
    </script>
  </body>
</html>
