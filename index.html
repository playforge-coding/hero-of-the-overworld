<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Lock zoom and honour the notch: the game fills the display and the
         canvas draws under rounded corners / camera cut-outs. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- Standalone, dark UI when added to a phone home screen. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#05060a" />
    <title>Hero of the Overworld</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        /* `dvh` tracks the *visible* viewport, so the canvas doesn't jump when a
           mobile browser's address bar slides away (unlike `vh`). */
        width: 100%;
        height: 100dvh;
        background: #05060a;
        overflow: hidden;
        /* Kill iOS rubber-band scrolling / pull-to-refresh over the game. */
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        /* `fixed` stops the page itself from scrolling on mobile. */
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        /* No blue tap flash or text selection when jabbing the controls. */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
        /* The renderer routes touches to the on-screen controls itself, so the
           browser must not treat them as scroll/zoom gestures. */
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <!-- macroquad renders into a canvas with this exact id. -->
    <canvas id="glcanvas" tabindex="1"></canvas>
    <!-- miniquad/macroquad JS glue. Self-hosted next to this page (the docs CI
         downloads it); for local web dev, fetch it once:
           curl -L https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js -o mq_js_bundle.js -->
    <script src="./mq_js_bundle.js"></script>
    <!-- Save-file support: sapp_jsutils marshals byte buffers between wasm and
         JS, and hoto_storage.js persists them to IndexedDB. Both register
         miniquad plugins, so they must load after the bundle and before the
         wasm module is instantiated. -->
    <script src="./sapp_jsutils.js"></script>
    <script src="./hoto_storage.js"></script>
    <script>
      // The bin is named `hero`, so `cargo build --target wasm32-unknown-unknown`
      // produces hero.wasm.
      load("./hero.wasm");
    </script>
  </body>
</html>
